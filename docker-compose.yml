services:
  emqx:
    image: emqx/emqx-enterprise:6.2.0
    container_name: emqx-enterprise
    # 设置容器内部的主机名。EMQX 使用 data/mnesia/<节点名> 作为数据存储目录，固定 hostname 避免数据丢失
    hostname: node1.emqx.com
    environment:
      # 配置 EMQX 的节点名称。格式为 "前缀@主机名"，与上方的 hostname 保持一致
      EMQX_NODE_NAME: "emqx@node1.emqx.com"
    ports:
      - "1883:1883"     # MQTT/TCP 协议默认端口，用于大多数物联网设备直连
      - "8883:8883"     # MQTT/TCP w/ SSL 端口，加密的设备端连接
      - "18083:18083"   # EMQX Dashboard 可视化管理控制台端口
    volumes:
      - ./.docker/emqx/data:/opt/emqx/data
      - ./.docker/emqx/log:/opt/emqx/log

  mysql:
    image: mysql:9.7
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: smart_lock
    volumes:
      - ./.docker/mysql/data:/var/lib/mysql
      # 数据目录为空时，MySQL 启动会自动执行该 SQL 完成建库建表
      - ./smart_lock_be.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  redis:
    image: redis:8.6-alpine
    container_name: redis
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-lock-be:latest
    container_name: smart-lock-be
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      emqx:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smart_lock?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATA_REDIS_HOST: redis
      SMARTLOCK_MQTT_URL: tcp://emqx:1883
